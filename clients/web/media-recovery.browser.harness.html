<!doctype html>
<meta charset="utf-8">
<title>media recovery browser harness</title>
<script type="module">
import { MediaRecoveryGate } from "./media-recovery.js";
import { createSessionBootstrap } from "./session-bootstrap.js";
import { TransportSessionLifecycle } from "./transport-session.js";
import { readUniStream } from "./uni-stream.js";
import {
  VIDEO_STALL_THRESHOLD_MS,
  allVideoSourcesStalled,
  createVideoFreshness,
  newlyStalledSources,
  noteVideoFrame,
} from "./video-stall.js";
import { STREAM_KIND_AUTHORITY, STREAM_KIND_VIDEO } from "./wire.js";

function envelopeFields(bytes) {
  const fields = new Map();
  let offset = 1;
  while (offset < bytes.length) {
    let tag = 0;
    let shift = 0;
    for (;;) {
      const byte = bytes[offset++];
      tag |= (byte & 0x7f) << shift;
      if ((byte & 0x80) === 0) break;
      shift += 7;
    }
    const field = tag >>> 3;
    const wireType = tag & 7;
    if (wireType === 0) {
      fields.set(field, bytes[offset++]);
      continue;
    }
    let length = 0;
    shift = 0;
    for (;;) {
      const byte = bytes[offset++];
      length |= (byte & 0x7f) << shift;
      if ((byte & 0x80) === 0) break;
      shift += 7;
    }
    fields.set(field, bytes.subarray(offset, offset + length));
    offset += length;
  }
  return fields;
}

async function run() {
  let availableStreamSlots = 0;
  let cancelReason = null;
  const abandoned = new ReadableStream({
    start(controller) {
      controller.enqueue(new Uint8Array([STREAM_KIND_VIDEO, 1, 2]));
    },
    cancel(reason) {
      cancelReason = reason;
      availableStreamSlots += 1;
    },
  });
  const abandonedResult = await readUniStream(abandoned.getReader(), {
    authorityKind: STREAM_KIND_AUTHORITY,
    decode: () => null,
    onAuthorityEnvelope: () => {},
    shouldContinue: () => false,
  });

  const freshness = createVideoFreshness();
  noteVideoFrame(freshness, 0, 0);
  noteVideoFrame(freshness, 1, 0);
  newlyStalledSources(freshness, VIDEO_STALL_THRESHOLD_MS);
  const gate = new MediaRecoveryGate(VIDEO_STALL_THRESHOLD_MS);

  const writes = [];
  const state = {
    connected: true,
    sessionWriter: { write: async (bytes) => writes.push(bytes) },
  };
  const transport = { closeCount: 0, close() { this.closeCount += 1; } };
  const transportSessions = new TransportSessionLifecycle();
  const token = transportSessions.begin(transport);
  const bootstrap = createSessionBootstrap({
    state,
    surface: {},
    transportSessions,
    motionScope: "vehicle.motion",
    controlStarted: async () => {},
    log: () => {},
    authorityFor: () => ({}),
    executeLeaseAction: async () => false,
    velocityCapabilityFor: () => true,
    handleActionResult: () => {},
    applyLeaseResponse: () => {},
  });
  const requested = gate.decide(allVideoSourcesStalled(freshness), 3000) === "attach"
    && await bootstrap.requestMediaAttach();

  const resumed = [];
  for (const sourceId of [0, 1]) {
    if (availableStreamSlots !== 1) throw new Error("incoming stream slot was not recovered");
    availableStreamSlots -= 1;
    const stream = new ReadableStream({
      start(controller) {
        controller.enqueue(new Uint8Array([STREAM_KIND_VIDEO, sourceId]));
        controller.close();
      },
    });
    const frame = await readUniStream(stream.getReader(), {
      authorityKind: STREAM_KIND_AUTHORITY,
      decode: () => null,
      onAuthorityEnvelope: () => {},
    });
    availableStreamSlots += 1;
    resumed.push(frame.kind === STREAM_KIND_VIDEO && noteVideoFrame(freshness, sourceId, 3001));
  }

  const fields = envelopeFields(writes[0] ?? new Uint8Array());
  return {
    abandoned: abandonedResult.aborted,
    cancelKind: cancelReason?.kind ?? null,
    creditRecovered: availableStreamSlots === 1,
    requested,
    typedRequest: fields.has(19) && fields.get(19).length === 0,
    sameSession: transportSessions.currentToken() === token && transport.closeCount === 0,
    resumed: resumed.every(Boolean) && !allVideoSourcesStalled(freshness),
    navigationCount: performance.getEntriesByType("navigation").length,
  };
}

try {
  await fetch("/result", { method: "POST", body: JSON.stringify(await run()) });
} catch (error) {
  await fetch("/result", { method: "POST", body: JSON.stringify({ error: String(error?.stack ?? error) }) });
}
</script>
