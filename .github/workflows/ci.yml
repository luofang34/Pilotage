name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # buf breaking compares the working tree against the base ref, so the
          # base commit must be present locally; a shallow clone would hide it.
          fetch-depth: 0

      - name: Install system dependencies (hidapi on Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --all-targets

      - name: cargo doc
        env:
          RUSTDOCFLAGS: "-D missing_docs -D rustdoc::broken_intra_doc_links"
        run: cargo doc --no-deps

      - name: cargo build --release
        run: cargo build --release

      - name: check-structure
        run: bash scripts/check-structure.sh

      - name: buf lint and breaking
        if: hashFiles('schemas/**/*.proto') != ''
        uses: bufbuild/buf-action@v1
        with:
          input: schemas
          lint: true
          format: false
          breaking: true
          # Detect wire-schema breakage against the target of this PR (or the
          # commit before a push), so field-number reuse and other incompatible
          # edits fail CI (ADR-0014).
          breaking_against: "https://github.com/${{ github.repository }}.git#branch=${{ github.event.pull_request.base.ref || github.event.repository.default_branch }},subdir=schemas"
          push: false
          pr_comment: false
