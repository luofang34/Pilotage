name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # buf breaking compares the working tree against the base ref, so the
          # base commit must be present locally; a shallow clone would hide it.
          fetch-depth: 0

      - name: Install system dependencies (hidapi on Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: thumbv7em-none-eabihf, wasm32-unknown-unknown

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.126 --locked

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --all-targets

      - name: cargo doc
        env:
          RUSTDOCFLAGS: "-D missing_docs -D rustdoc::broken_intra_doc_links"
        run: cargo doc --no-deps

      - name: cargo build --release
        run: cargo build --release

      - name: check-structure
        run: bash scripts/check-structure.sh

      - name: instrument requirement references
        run: bash scripts/check-instrument-requirements.sh

      - name: certification-claim guard (AIR-03)
        # Fail on any tracked doc/UI artifact that asserts a certification,
        # compliance, approval, or airworthiness claim about this SIM project.
        run: bash scripts/check-certification-claims.sh

      - name: standards registry drift guard (AIR-04)
        # Keep the standards registry honest and the applicability matrix in
        # sync with it: fail closed on an absent/empty registry, on missing
        # status provenance, on contradictory active/superseded classifications,
        # and on matrix drift. This checks internal consistency only and does
        # not prove external freshness, which remains a human source review.
        run: bash scripts/check-standards-registry.sh

      - name: instrument trace inventory (AIR-03)
        # Emit a requirement/test/review/configuration inventory to the log.
        # This is an inventory, not a compliance trace, and fabricates nothing.
        run: bash scripts/trace-report.sh

      - name: instrument crates are no_std (ADR-0017)
        # Compiling the instrument family for a bare-metal target proves the
        # no_std/no-alloc claim instead of trusting a comment.
        run: >
          cargo check
          -p pilotage-frames
          -p pilotage-geo
          -p pilotage-alerts
          -p pilotage-instrument-state
          -p pilotage-instrument-scene
          -p pilotage-instrument-glyphs
          -p pilotage-instrument-panels
          -p pilotage-instrument-raster
          --target thumbv7em-none-eabihf

      - name: target timing gate (REN-04)
        # No display hardware is selected: the USB CDC scan documents that no
        # target is connected, and the envelope gate prices the per-class
        # work budget with the conservative model against the frame deadline
        # derived from the SIM display liveness requirement. The artifact
        # drift guard keeps the committed timing record equal to the shipped
        # model. The envelope is provisional — not a WCET claim — until a
        # measured target binds firmware, clock, memory, and compiler state.
        run: |
          bash scripts/detect-target.sh
          cargo test -p pilotage-instrument-raster timing

      - name: geospatial contract (SVS-01)
        # Datum discipline, coherence, view/projection, availability, and the
        # fail-closed versioned ABI for synthetic vision and conformal HUD.
        run: cargo test -p pilotage-geo

      - name: database package integrity (SVS-02)
        # Signed, provenance-preserving, atomically activated aeronautical
        # database packages: one-byte mutation fails tile/package verification,
        # interrupted update yields the prior package or none, and trust-root,
        # rollback, expiry, coverage, and datum rules fail closed.
        run: cargo test -p pilotage-svs-db

      - name: reference rasterizer frame hashes (REN-03)
        # Re-render the PFD and HSI panels and assert their pinned SHA-256
        # frame hashes, proving the software rasterizer is bit-reproducible.
        run: cargo test -p pilotage-instrument-raster

      - name: instrument wasm backend builds
        # Generating the resource binding here makes the fail-visible test
        # exercise the exact WASM artifact served by the browser client.
        run: bash scripts/build-web-instruments.sh

      - name: glyph pack integrity (REN-02)
        # Mandatory-vocabulary completeness, byte-identical reproducibility,
        # and fail-closed corruption detection for the controlled glyph pack.
        run: cargo test -p pilotage-instrument-glyphs

      - name: web viewer wire conformance
        run: node clients/web/wire.test.mjs

      - name: telemetry ingress gate contract
        run: node clients/web/telemetry-ingress.test.mjs

      - name: telemetry display retirement contract
        run: node clients/web/telemetry-display.test.mjs

      - name: transport session identity contract
        run: node clients/web/transport-session.test.mjs

      - name: instrument display fail-visible contract
        run: node clients/web/instruments.test.mjs

      - name: renderer backend conformance corpus
        run: node clients/web/scene-conformance.test.mjs

      - name: browser video capture-identity tests (HUD-01)
        run: node clients/web/video-identity.test.mjs

      - name: viewer video-diagnostics decision logic (readiness dedup + read-failure coalescing)
        run: node clients/web/video-diagnostics.test.mjs

      - name: viewer incoming-uni-stream accept-loop lifecycle (stream isolation + terminal collection)
        run: node clients/web/uni-stream-accept.test.mjs

      - name: wasm wire-decode conformance (REN)
        # The wasm exports the viewer decodes with must agree with the JS
        # reference decoders on layout, numeric kinds, and the capture-identity
        # contract; this loads the real wasm artifact built above.
        run: node clients/web/wire-wasm.test.mjs

      - name: browser H.264 decode lifecycle + Annex-B fixture (REN)
        run: node clients/web/video-h264.test.mjs

      - name: real Chromium/WebCodecs fixture decode (VID-02)
        # A real browser decodes the recorded Annex-B fixture through the
        # viewer's wasm session machine and platform adapter: every frame
        # output, at the recorded dimensions, and closed by the adapter.
        run: node clients/web/video-h264.browser.test.mjs

      - name: viewer entrypoint boot contract (VID-04)
        # A real browser loads the unmodified index.html + main.js: module
        # evaluation must complete with no wasm-backed object constructed
        # before wasm init, a good wasm load ends in live panels, and a
        # failed wasm load degrades visibly without killing the viewer.
        run: node clients/web/viewer-boot.browser.test.mjs

      - name: browser snapshot-association tests (HUD-01)
        run: node clients/web/snapshot-association.test.mjs

      - name: browser camera calibration contract (HUD-02)
        run: node clients/web/calibration.test.mjs

      - name: browser turn-derivation tests (DYN-01)
        run: node clients/web/turn-derivation.test.mjs

      - name: browser wire-range identity bounds (GEO-68)
        run: node clients/web/wire-bounds.test.mjs

      - name: Setup buf
        if: hashFiles('schemas/**/*.proto') != ''
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: buf lint
        if: hashFiles('schemas/**/*.proto') != ''
        run: buf lint schemas

      - name: buf breaking
        if: hashFiles('schemas/**/*.proto') != ''
        # Detect wire-schema breakage against the target of this PR (or the
        # default branch on push), so field-number reuse and other incompatible
        # edits fail CI (ADR-0014). buf hard-fails when the base ref contains
        # no .proto files at all (a module with zero protos is an error, not an
        # empty baseline), so the comparison is skipped until schemas exist on
        # the base ref.
        run: |
          base="${{ github.base_ref || github.event.repository.default_branch }}"
          if git ls-tree -r "origin/${base}" --name-only | grep -q '^schemas/.*\.proto$'; then
            buf breaking schemas --against ".git#ref=refs/remotes/origin/${base},subdir=schemas"
          else
            echo "origin/${base} has no .proto files yet; nothing to compare against."
          fi
