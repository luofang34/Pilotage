// Telemetry wire types (ADR-0011: best-effort by default, units and frames
// fixed by the schema).
syntax = "proto3";

package pilotage.v1;

import "pilotage/v1/common.proto";

// A planar pose: position in meters and heading in radians, in the vehicle's
// local reference frame unless otherwise documented by the adapter
// capability (ADR-0008).
message Pose2d {
  float x_m = 1;
  float y_m = 2;
  float heading_rad = 3;
}

// Planar velocity: linear components in meters/second, angular in
// radians/second.
message Velocity2d {
  float linear_x_mps = 1;
  float linear_y_mps = 2;
  float angular_rad_s = 3;
}

// The monotonic clock domain used by a MeasurementStamp. Values in different
// domains are not directly comparable without an explicit clock correlation.
enum MeasurementClock {
  MEASUREMENT_CLOCK_UNSPECIFIED = 0;
  MEASUREMENT_CLOCK_VEHICLE_BOOT = 1;
  MEASUREMENT_CLOCK_SIMULATION = 2;
  // Monotonic time on the ground host that received the observation, for
  // reports whose wire carries no source timestamp (an FC heartbeat).
  // Receive time is not acquisition time: staleness reasoning only, never
  // cross-domain correlation without an explicit mapping.
  MEASUREMENT_CLOCK_HOST_MONOTONIC = 3;
}

// Explicit role of the source behind a measurement. Role travels in
// provenance — never in id ranges — so a configured source id may collide
// across roles without ambiguity; consumers gate on the role itself.
enum SourceRole {
  SOURCE_ROLE_UNSPECIFIED = 0;
  // FC estimator output: the only role eligible for primary panels and
  // operational command construction.
  SOURCE_ROLE_OPERATIONAL_ESTIMATE = 1;
  // Simulator ground truth: logging, assertions, and comparison in
  // simulation profiles only.
  SOURCE_ROLE_SIMULATION_TRUTH = 2;
  // FC-owned vehicle state (arm/mode/failsafe) reports.
  SOURCE_ROLE_FC_STATE = 3;
  // Video capture identity for camera frames.
  SOURCE_ROLE_VIDEO_CAPTURE = 4;
  // Payload-device orientation/state (gimbal attitude) relayed over the
  // FC link: not a vehicle estimate and never eligible for control
  // validation. Carries the device's own boot clock, not host time.
  SOURCE_ROLE_PAYLOAD_DEVICE = 5;
}

// Integrity classification of the path that delivered an observation. The
// end-to-end distinction that matters is authenticated source data versus
// merely checksummed or unprotected observations.
enum SourceIntegrity {
  SOURCE_INTEGRITY_UNSPECIFIED = 0;
  // Cryptographically authenticated end-to-end source data.
  SOURCE_INTEGRITY_AUTHENTICATED = 1;
  // Checksummed (CRC-style) but unauthenticated transport.
  SOURCE_INTEGRITY_CHECKSUMMED_ONLY = 2;
  // No integrity protection beyond the transport's own boundaries (a local
  // shared-memory mapping relies on host process isolation).
  SOURCE_INTEGRITY_UNPROTECTED = 3;
}

// Identity and acquisition stamp for one independently advancing measurement
// group. Re-publishing a cached group preserves every field unchanged.
message MeasurementStamp {
  // Adapter-defined source identity, stable within one vehicle.
  uint64 source_id = 1;
  // Source boot/attachment generation. A reset changes this value.
  uint32 source_epoch = 2;
  // Wrapping group sequence, advanced only for a new measurement.
  uint32 sequence = 3;
  // Monotonic acquisition time in the declared clock domain.
  uint64 acquired_at_ns = 4;
  MeasurementClock clock = 5;
  // Opaque 128-bit attachment/boot identity. Receivers compare this for
  // equality and accept changes only at an authorized lifecycle boundary.
  bytes source_incarnation = 6;
  // Explicit source role; consumers gate on this, never on id ranges.
  SourceRole role = 7;
  // Integrity classification of the delivering path; carried by every
  // role so authenticated, checksummed, and unprotected inputs stay
  // distinguishable end to end.
  SourceIntegrity integrity = 8;
}

// Raw avionics state estimate for flight vehicles (ADR-0018): attitude
// quaternion (body FRD → world NED), body rates, NED position/velocity,
// and the adapter's effective latched validity/quality authorization. Numeric
// values are the estimator's output, not display-ready numbers — display
// derivation (altitude, groundspeed, Euler angles) happens in the instrument
// runtime (ADR-0017). Ground vehicles never set this field.
message AvionicsState {
  // Fields 1–7 are meaningful only when attitude_stamp is present. Proto3
  // scalar defaults are not measurements and must not be displayed as such.
  float quat_w = 1;
  float quat_x = 2;
  float quat_y = 3;
  float quat_z = 4;
  float rate_p_rad_s = 5;
  float rate_q_rad_s = 6;
  float rate_r_rad_s = 7;
  // Fields 8–13 are meaningful only when kinematics_stamp is present.
  float pos_n_m = 8;
  float pos_e_m = 9;
  float pos_d_m = 10;
  float vel_n_mps = 11;
  float vel_e_mps = 12;
  float vel_d_mps = 13;
  // Effective latched authorization: bit0 attitude, bit1 rates, bit2 position,
  // bit3 velocity. It can include fail-closed downgrades relative to the raw
  // status observation and is meaningful only when estimator_status_stamp is
  // present.
  uint32 valid_flags = 14;
  // Effective latched quality: 0 good, 1 degraded, 2 unusable. It can include
  // fail-closed downgrades relative to the raw status observation and is
  // meaningful only when estimator_status_stamp is present.
  uint32 quality = 15;
  // 0 unknown, 1 disarmed, 2 armed (from the vehicle's own report).
  // FC-owned arm state with provenance is published as
  // TelemetrySample.fc_state; a publisher emitting fc_state leaves this
  // field 0 rather than merging an unstamped copy here.
  uint32 arm_state = 16 [deprecated = true];
  // Attitude/rates and position/velocity advance independently. Absence means
  // that group was not supplied in this publication.
  MeasurementStamp attitude_stamp = 17;
  MeasurementStamp kinematics_stamp = 18;
  // Acquisition identity of the status observation backing valid_flags and
  // quality. Absence means no explicit estimator authorization was supplied
  // and consumers fail closed.
  MeasurementStamp estimator_status_stamp = 19;
}

// One coherent simulator ground-truth sample: the simulation oracle for
// logging, test assertions, and estimate-versus-truth comparison in
// simulation profiles only. Truth is not an FC estimator output: it drives
// no primary panel, never constructs operational commands, and is never a
// fallback for a missing estimate. Physical profiles must not publish it.
message SimTruthState {
  // Attitude quaternion (w, x, y, z), body FRD → world NED.
  float quat_w = 1;
  float quat_x = 2;
  float quat_y = 3;
  float quat_z = 4;
  // NED position (meters) and velocity (m/s).
  float pos_n_m = 5;
  float pos_e_m = 6;
  float pos_d_m = 7;
  float vel_n_mps = 8;
  float vel_e_mps = 9;
  float vel_d_mps = 10;
  // Identity and acquisition of this truth observation. Absence makes the
  // sample unconsumable: truth without provenance is discarded.
  MeasurementStamp stamp = 11;
  // Which truth fields this sample carries, in the estimate mask's bit
  // positions: bit0 attitude, bit1 rates, bit2 position, bit3 velocity.
  // Availability only — truth has no estimator authorization to claim.
  uint32 valid_flags = 12;
}

// FC-owned vehicle state (arm today; mode/failsafe belong here as they
// arrive) under its own provenance stamp: the FC is the only author, and
// the stamp records the link observation that reported it.
message FcState {
  // 0 unknown, 1 disarmed, 2 armed.
  uint32 arm_state = 1;
  // Identity and acquisition of the FC report carrying this state.
  // Absence makes the sample unconsumable.
  MeasurementStamp stamp = 2;
  // The FC's acknowledgement (COMMAND_ACK) of the most recent commanded
  // arm or disarm: 0 none observed, 1 the command was an arm, 2 a disarm.
  // Enactment truth for the operator — the action-result path's
  // command-acceptance semantics are unchanged by this lane.
  uint32 last_command_kind = 3;
  // Raw MAV_RESULT for that command (0 = accepted); meaningful only when
  // last_command_kind is non-zero.
  uint32 last_command_result = 4;
}

// Gimbal device orientation (Gimbal Protocol v2 attitude status) under its
// own provenance stamp: payload-device state, never a vehicle estimate and
// never an input to control validation.
message GimbalAttitude {
  // Orientation quaternion (w, x, y, z); vehicle-frame yaw unless the
  // device declares an earth-frame yaw mode.
  float quat_w = 1;
  float quat_x = 2;
  float quat_y = 3;
  float quat_z = 4;
  // Device angular velocity (rad/s); NaN encodes device-unknown.
  float rate_x_rad_s = 5;
  float rate_y_rad_s = 6;
  float rate_z_rad_s = 7;
  // Identity and acquisition of the device report. Absence makes the
  // sample unconsumable.
  MeasurementStamp stamp = 8;
  // GIMBAL_DEVICE_FLAGS in effect (mode/lock bits).
  uint32 flags = 9;
  // Non-zero reports a device failure condition.
  uint32 failure_flags = 10;
}

// A single best-effort telemetry sample for one vehicle.
message TelemetrySample {
  VehicleId vehicle = 1;
  SimTick tick = 2;
  // Host publication time. This is transport metadata, not source
  // acquisition time; group acquisition stamps live in AvionicsState.
  MonoTimestamp observed_at = 3;
  // Absence means no coherent planar projection is available. Receivers must
  // not substitute an origin pose or zero velocity.
  Pose2d pose = 4;
  Velocity2d velocity = 5;
  AvionicsState avionics = 6;
  // Simulation-truth oracle, independent of avionics in identity, epoch,
  // sequence, clock, and validity; never an operational fallback.
  SimTruthState sim_truth = 7;
  // FC-owned arm/mode state with its own provenance stamp.
  FcState fc_state = 8;
  // Gimbal payload-device orientation with its own provenance stamp.
  GimbalAttitude gimbal = 9;
}
