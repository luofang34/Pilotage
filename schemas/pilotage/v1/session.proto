// Session-bootstrap wire vocabulary: client/server handshake, scope-lease
// request/response, RTT probing, and frame-rejection notices (ADR-0005,
// ADR-0006, ADR-0009, ADR-0010).
syntax = "proto3";

package pilotage.v1;

import "pilotage/v1/capability.proto";
import "pilotage/v1/common.proto";
import "pilotage/v1/control.proto";

// The first message a client sends after the WebTransport session is
// established, before any host state has been shared (ADR-0005: session
// bootstrap uses plain HTTPS for admission, then this message begins the
// in-session handshake).
message ClientHello {
  // Highest `pilotage.v1` schema version the client can interpret; the host
  // may reject or downgrade based on this (ADR-0014).
  uint32 protocol_version = 1;
  // Human-readable client identification (application name/version), for
  // diagnostics only; never used for authorization decisions.
  string client_name = 2;
  // Opaque join token proving prior admission (issued out-of-band by the
  // HTTPS bootstrap flow of ADR-0005). The wire type treats this as opaque
  // bytes; only the issuing admission service interprets its contents.
  bytes join_token = 3;
}

// The host's reply to `ClientHello`, establishing the session identity and
// publishing the state the client needs to render an initial UI.
message ServerWelcome {
  SessionId session = 1;
  // Principal identity the host assigned to this connection for the
  // lifetime of the session.
  PrincipalId principal = 2;
  HostCapabilities host_capabilities = 3;
  // Every (vehicle, scope) pair the host currently tracks, with its present
  // holder (if any) and fencing generation, so the client can render
  // current ownership without waiting for the next authority event.
  repeated ScopeHolderSnapshot scope_holders = 4;
}

// A single (vehicle, scope) pair's current holder and fencing generation,
// as of the moment `ServerWelcome` was constructed (ADR-0006, ADR-0010).
message ScopeHolderSnapshot {
  VehicleId vehicle = 1;
  ScopeId scope = 2;
  // Absent when the scope is currently unassigned.
  PrincipalId holder = 3;
  Generation generation = 4;
}

// A client's request to lease a control scope for a vehicle (ADR-0006).
message LeaseRequest {
  VehicleId vehicle = 1;
  ScopeId scope = 2;
}

// Why a `LeaseRequest` was denied. Unset (`UNSPECIFIED`) only appears on a
// malformed response; a well-formed denial always carries a concrete reason.
enum LeaseDenialReason {
  LEASE_DENIAL_REASON_UNSPECIFIED = 0;
  // Another principal currently holds the scope and did not offer it.
  LEASE_DENIAL_REASON_ALREADY_HELD = 1;
  // The (vehicle, scope) pair is not published by the host's capabilities.
  LEASE_DENIAL_REASON_UNKNOWN_SCOPE = 2;
  // The requesting principal lacks the authority class required for this
  // scope (ADR-0010).
  LEASE_DENIAL_REASON_NOT_AUTHORIZED = 3;
}

// The host's reply to a `LeaseRequest`.
message LeaseResponse {
  VehicleId vehicle = 1;
  ScopeId scope = 2;
  bool granted = 3;
  // The new fencing generation on grant; the current (unchanged) generation
  // on denial, so the client can still fence stale in-flight frames.
  Generation generation = 4;
  // Meaningful only when `granted` is false.
  LeaseDenialReason reason = 5;
}

// A holder voluntarily relinquishes a control scope — the viewer latched
// input loss (window blur froze its input sources), or any client choosing
// to stand down. Routed through the authority engine's release path: the
// generation advances (stragglers are fenced) and the vehicle's link-loss
// policy engages, exactly as for an involuntary loss. Sent on the reliable
// bootstrap stream, never as a droppable datagram.
message LeaseRelease {
  VehicleId vehicle = 1;
  ScopeId scope = 2;
}

// The host's acknowledgement of a `LeaseRelease`: the client may treat its
// authority as relinquished the moment this arrives (the host silence
// watchdog remains the independent backup if it never does).
message LeaseReleased {
  VehicleId vehicle = 1;
  ScopeId scope = 2;
  // False when the sender did not hold the scope (nothing was released).
  bool released = 3;
  // The fencing generation now in force.
  Generation generation = 4;
}

// A reliable notice that the host has CLEARED its link-loss latch for one
// scope of a vehicle: the accepted neutral frame on `generation` satisfied the
// recovery activation condition, so the neutralize/brake policy is lifted. The
// controlling client correlates by vehicle/scope/generation to know its
// recovery landed rather than trusting that a best-effort control datagram
// arrived (ADR-0012).
message LinkLossCleared {
  VehicleId vehicle = 1;
  ScopeId scope = 2;
  // The fresh generation whose accepted neutral frame cleared the latch.
  Generation generation = 3;
}

// An RTT/offset probe carrying the sender's local transport-time sample.
// `nonce` correlates a `Ping` with its `Pong`; it carries no ordering or
// uniqueness guarantee beyond what the sender chooses.
//
// The sender timestamp is a `transport_time` sample local to the sender
// (ADR-0009) and MUST NOT be compared directly against a timestamp from a
// different endpoint. It is only meaningful as input to
// `pilotage-timing`'s RTT/offset estimator, which correlates it with the
// receiver's own local clock readings at send and receive time.
message Ping {
  uint64 nonce = 1;
  MonoTimestamp sender_sent_at = 2;
}

// The reply to a `Ping`, echoing its nonce and sender timestamp and adding
// the responder's own local transport-time sample at the moment of reply.
//
// As with `Ping`, `responder_sent_at` is local to the responder and must
// never be compared raw against `echoed_sender_sent_at`; both feed
// `pilotage-timing`'s estimator, never a direct subtraction.
message Pong {
  uint64 nonce = 1;
  MonoTimestamp echoed_sender_sent_at = 2;
  MonoTimestamp responder_sent_at = 3;
}

// Why an admitted `ControlFrame` was not enacted, either at host ingress or
// at the vehicle-adapter boundary (ADR-0009 rejection rules).
enum FrameRejectionReason {
  FRAME_REJECTION_REASON_UNSPECIFIED = 0;
  // The frame's `generation` is older than the scope's current generation.
  FRAME_REJECTION_REASON_STALE_GENERATION = 1;
  // The scope has no current holder, so no sender is authorized to command
  // it.
  FRAME_REJECTION_REASON_NO_HOLDER = 2;
  // The (vehicle, scope) pair is not published by the host's capabilities.
  FRAME_REJECTION_REASON_UNKNOWN_SCOPE = 3;
  // The frame's sampled-at timestamp is older than the configured maximum
  // control age.
  FRAME_REJECTION_REASON_TOO_OLD = 4;
  // The frame carried NO command representation: no legacy payload, no typed
  // intent, and no actions.
  FRAME_REJECTION_REASON_EMPTY_COMMAND = 5;
  // The frame carried BOTH the legacy payload and a typed intent/actions;
  // exactly one representation is allowed.
  FRAME_REJECTION_REASON_DUAL_COMMAND = 6;
  // The typed intent's family or reference frame is not advertised for the
  // frame's scope.
  FRAME_REJECTION_REASON_UNSUPPORTED_INTENT = 7;
  // A typed action (or its mode target) is not advertised for the frame's
  // scope.
  FRAME_REJECTION_REASON_UNSUPPORTED_ACTION = 8;
  // A typed intent component exceeds the scope's advertised magnitude limit.
  FRAME_REJECTION_REASON_LIMIT_EXCEEDED = 9;
  // The frame's actions repeat or conflict (ARM together with DISARM); the
  // frame is rejected whole, executing neither.
  FRAME_REJECTION_REASON_CONFLICTING_ACTIONS = 10;
  // A legacy payload omitted an axis its scope's translation routes. The
  // typed translation is structurally total, so a partial payload would
  // silently turn "no update" into an explicit neutral — including inside
  // the recovery activation check. Legacy senders must report every routed
  // axis.
  FRAME_REJECTION_REASON_PARTIAL_COMMAND = 11;
  // A typed frame's `activation_revision` does not match the sender's
  // announced `ProfileActivation` (or nothing was announced): the host
  // cannot bind the frame to profile evidence, so it is not applied.
  FRAME_REJECTION_REASON_PROFILE_MISMATCH = 12;
  // The datagram frame carried typed discrete actions. Actions ride ONLY the
  // reliable ordered session stream (ControlActionCommand) — a dropped or
  // reordered edge changes meaning, so the droppable channel refuses them.
  FRAME_REJECTION_REASON_ACTION_ON_DATAGRAM = 13;
  // The frame's session id is not the sender's own session.
  FRAME_REJECTION_REASON_SESSION_MISMATCH = 14;
  // The frame's sequence does not advance past the last accepted one for
  // its authority at this generation (a duplicate or reordered datagram).
  FRAME_REJECTION_REASON_STALE_SEQUENCE = 15;
  // The frame carried a legacy numeric payload but this host runs
  // typed-only (the production default); legacy translation exists only
  // behind the explicit simulation compatibility mode.
  FRAME_REJECTION_REASON_LEGACY_DISABLED = 16;
  // The adapter rejected the admitted frame for a reason without a more
  // specific wire representation.
  FRAME_REJECTION_REASON_ADAPTER_REJECTED = 17;
  // The adapter's vehicle uplink has no active command sequence. Session
  // authority remains held, but the operator must arm before frames enact.
  FRAME_REJECTION_REASON_UPLINK_IDLE = 18;
}

// Sent back to the frame's sender (never broadcast) when a `ControlFrame` is
// well-formed but not honored at ingress or enactment, so the client can
// distinguish "dropped in transit" from "explicitly rejected" (ADR-0009,
// ADR-0012).
message FrameRejected {
  VehicleId vehicle = 1;
  ScopeId scope = 2;
  SequenceNum sequence = 3;
  FrameRejectionReason reason = 4;
  // The scope's fencing generation at the time of rejection, so the sender
  // can decide whether to resynchronize before retrying.
  Generation current_generation = 5;
}

// The explicit outcome of ONE typed discrete action, sent to the frame's
// sender on the reliable session stream after the adapter disposed of it —
// every accepted frame's action gets exactly one result, so an operator can
// distinguish "arm honored" from "arm silently dropped" (CTRL-01).
message ControlActionResult {
  VehicleId vehicle = 1;
  ScopeId scope = 2;
  // The fencing generation and sequence of the frame that carried the
  // action, correlating the result to the exact press.
  Generation generation = 3;
  SequenceNum sequence = 4;
  ControlAction action = 5;
  // Echoed target for a MODE_REQUEST; unspecified otherwise.
  ModeTarget mode_target = 6;
  bool accepted = 7;
  // Adapter-supplied reason when not accepted; empty on acceptance.
  string detail = 8;
  // Echoes the request's correlation id, so a retransmitting sender can
  // resolve exactly the press this result answers. Zero when the request
  // carried none.
  uint32 action_id = 9;
}
